---
name: 'Build Nix'
description: 'Build a nix flake output and extract store paths for caching'
inputs:
  config:
    description: 'Matrix entry to build (e.g., d:media, c:furfur, p:ncf, s:default)'
    required: true
  output-link:
    description: 'Path to output link (optional)'
    required: false
    default: ''
  paths-file:
    description: 'Path to write extracted store paths for caching'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: build nix output
      shell: bash
      env:
        CONFIG_NAME: ${{ inputs.config }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        PATHS_FILE: ${{ inputs.paths-file }}
      run: |
        BUILD_PATH=$(nix run .#env-aware-nix-run -- .#ncf -- ci build-path "$CONFIG_NAME")

        # Run the build
        if [[ -n "$OUTPUT_LINK" ]]; then
          STORE_PATH=$(nix build "$BUILD_PATH" -o "$OUTPUT_LINK" --print-out-paths)
        else
          STORE_PATH=$(nix build "$BUILD_PATH" --no-link --print-out-paths)
        fi

        # For nixos configurations, check that the flake source doesn't leak into the closure
        if [[ "$CONFIG_NAME" == d:* ]] || [[ "$CONFIG_NAME" == c:* ]]; then
          # For deploy-rs entries, resolve the activatable wrapper to the real system path
          if [[ "$CONFIG_NAME" == d:* ]] && [[ -L "$STORE_PATH/activate" ]]; then
            STORE_PATH=$(dirname "$(readlink "$STORE_PATH/activate")")
          fi
          nix run .#env-aware-nix-run -- .#check-no-flake-source-leak -- "$STORE_PATH"
        fi

        # If paths-file requested, extract build closure (includes build-time deps)
        if [[ -n "$PATHS_FILE" ]]; then
          echo "$STORE_PATH" >> "$PATHS_FILE"
        fi
