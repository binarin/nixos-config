name: 'Build Nix'
description: 'Build a nix flake output and extract store paths for caching'
inputs:
  config:
    description: 'Matrix entry to build (e.g., d:media, c:furfur, p:ncf, s:default)'
    required: true
  output-link:
    description: 'Path to output link (optional)'
    required: false
    default: ''
  paths-file:
    description: 'Path to write extracted store paths for caching'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: build nix output
      shell: bash
      env:
        CONFIG_NAME: ${{ inputs.config }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        PATHS_FILE: ${{ inputs.paths-file }}
      run: |
        BUILD_PATH=$(nix run .#env-aware-nix-run -- .#ncf -- ci build-path "$CONFIG_NAME")

        # Run the build
        if [[ -n "$OUTPUT_LINK" ]]; then
          nix build "$BUILD_PATH" -o "$OUTPUT_LINK"
        else
          nix build "$BUILD_PATH" --no-link
        fi

        # If paths-file requested, extract build closure (includes build-time deps)
        if [[ -n "$PATHS_FILE" ]]; then
          # Get the derivation for this build
          DRV=$(nix path-info --derivation "$BUILD_PATH")

          # Get all outputs in the build closure (runtime + build-time deps)
          # --include-outputs adds realized outputs of derivations in the closure
          # Filter out .drv files - we only want actual store paths
          nix-store -qR --include-outputs "$DRV" \
            | grep -v '\.drv$' \
            | sort -u > "$PATHS_FILE"

          echo "Extracted $(wc -l < "$PATHS_FILE") store paths for caching (build closure)"
        fi
