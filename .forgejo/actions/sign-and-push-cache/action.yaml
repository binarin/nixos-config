---
name: 'Sign and Push to Cache'
description: 'Sign Nix store paths and push to S3 cache'
inputs:
  paths-file:
    description: 'File containing store paths to sign and push (one per line)'
    required: true
  aws-access-key-id:
    description: 'AWS access key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS secret access key'
    required: true
  signing-key-pem:
    description: 'Private key for signing (PEM format)'
    required: true
runs:
  using: composite
  steps:
    - name: sign and push to niks3
      shell: bash
      env:
        PATHS_FILE: ${{ inputs.paths-file }}
        NIKS3_SERVER_URL: https://niks3.lynx-lizard.ts.net
      run: |
        if [[ ! -f "$PATHS_FILE" ]]; then
          echo "Error: paths-file does not exist: $PATHS_FILE"
          exit 1
        fi

        if [[ -z "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]] || [[ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]]; then
          echo "Error: OIDC not available (ACTIONS_ID_TOKEN_REQUEST_* vars not set)"
          echo "Ensure 'enable-openid-connect: true' is set in the workflow"
          exit 1
        fi

        export NIKS3_AUTH_TOKEN_FILE="$(mktemp)"
        trap 'rm -f "$NIKS3_AUTH_TOKEN_FILE"' EXIT
        if ! curl --fail --silent --show-error \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://niks3.lynx-lizard.ts.net" | \
          jq -r .value > "$NIKS3_AUTH_TOKEN_FILE"; then
          echo "Error: failed to obtain OIDC token from Forgejo"
          exit 1
        fi
        cat "$PATHS_FILE" | xargs --max-chars=1944546 --max-args=20000 niks3 push
