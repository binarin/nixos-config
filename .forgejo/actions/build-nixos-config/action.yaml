name: 'Build NixOS Configuration'
description: 'Build a single NixOS configuration and extract store paths for caching'
inputs:
  config:
    description: 'Configuration name to build'
    required: true
  output-link:
    description: 'Path to output link (optional)'
    required: false
    default: ''
  paths-file:
    description: 'Path to write extracted store paths for caching'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: build nixos configuration
      shell: bash
      env:
        CONFIG_NAME: ${{ inputs.config }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        PATHS_FILE: ${{ inputs.paths-file }}
      run: |
        BUILD_PATH=$(nix run .#env-aware-nix-run -- .#ncf -- ci build-path "$CONFIG_NAME")

        # First, run normal build with clean output for the actions log
        if [[ -n "$OUTPUT_LINK" ]]; then
          nix build "$BUILD_PATH" -o "$OUTPUT_LINK"
        else
          nix build "$BUILD_PATH" --no-link --print-out-paths
        fi

        # If paths-file requested, run debug build to collect store paths for caching
        # This should be fast since all derivations are already built
        if [[ -n "$PATHS_FILE" ]]; then
          DEBUG_LOG=$(mktemp)
          trap "rm -f $DEBUG_LOG" EXIT

          # Run with --debug to capture all store paths (suppress all output)
          nix build --debug "$BUILD_PATH" --no-link >"$DEBUG_LOG" 2>&1

          # Extract top-level store paths, excluding artifacts
          grep -oP "/nix/store/[a-z0-9]{32}-[^/'\"\s>]+" "$DEBUG_LOG" \
            | grep -v '\.drv$' \
            | grep -v '\^' \
            | grep -v '\.lock$' \
            | grep -v '\.chroot$' \
            | sort -u > "$PATHS_FILE"
          echo "Extracted $(wc -l < "$PATHS_FILE") store paths for caching"
        fi
