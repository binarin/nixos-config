name: 'Build NixOS Configuration'
description: 'Build a single NixOS configuration and extract store paths for caching'
inputs:
  config:
    description: 'Configuration name to build'
    required: true
  output-link:
    description: 'Path to output link (optional)'
    required: false
    default: ''
  paths-file:
    description: 'Path to write extracted store paths for caching'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: build nixos configuration
      shell: bash
      env:
        CONFIG_NAME: ${{ inputs.config }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        PATHS_FILE: ${{ inputs.paths-file }}
      run: |
        BUILD_PATH=$(nix run .#env-aware-nix-run -- .#ncf -- ci build-path "$CONFIG_NAME")

        # If paths-file requested, run eval --debug first to capture source fetches
        if [[ -n "$PATHS_FILE" ]]; then
          DEBUG_LOG=$(mktemp)
          trap "rm -f $DEBUG_LOG" EXIT

          # Run eval with --debug to capture all source fetches during evaluation
          nix eval --debug --raw "$BUILD_PATH" >"$DEBUG_LOG" 2>&1 || true

          # Extract store paths from debug output, excluding build artifacts
          grep -oP "/nix/store/[a-z0-9]{32}-[^/'\"\s>]+" "$DEBUG_LOG" \
            | grep -v '\.drv$' \
            | grep -v '\^' \
            | grep -v '\.lock$' \
            | grep -v '\.chroot$' \
            | sort -u > "$PATHS_FILE"
          echo "Extracted $(wc -l < "$PATHS_FILE") store paths from eval"
        fi

        # Run the build
        if [[ -n "$OUTPUT_LINK" ]]; then
          nix build "$BUILD_PATH" -o "$OUTPUT_LINK"
          STORE_PATH=$(readlink -f "$OUTPUT_LINK")
        else
          STORE_PATH=$(nix build "$BUILD_PATH" --no-link --print-out-paths)
        fi

        # If paths-file requested, add build output closure
        if [[ -n "$PATHS_FILE" ]]; then
          nix-store -qR "$STORE_PATH" >> "$PATHS_FILE"
          sort -u -o "$PATHS_FILE" "$PATHS_FILE"
          echo "Total $(wc -l < "$PATHS_FILE") store paths for caching (eval + build closure)"
        fi
