on:
  schedule:
    - cron: "13 10 * * Mon"
  workflow_dispatch: {}

jobs:
  define-matrix:
    runs-on: native
    outputs:
      configurations: ${{ steps.define.outputs.configurations }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - id: define
        run: |
          echo "configurations=$(nix run --ignore-env .#ncf -- ci matrix)" >> "$FORGEJO_OUTPUT"

  update-and-build:
    name: update ${{ matrix.config }}
    runs-on: native
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.define-matrix.outputs.configurations) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Update flake inputs
        run: nix flake update
      - name: give autofollow a chance to mess with flake.lock
        run: nix run .#write-flake
      - uses: ./.forgejo/actions/build-nixos-config
        with:
          config: ${{ matrix.config }}
          output-link: temp-result/${{ matrix.config }}
      - name: Add GC root
        run: |
          mkdir -p "$HOME/.cache/nixos-config/proposed-update/nixos-configuration"
          nix-store --add-root "$HOME/.cache/nixos-config/proposed-update/nixos-configuration/${{ matrix.config }}" \
            -r "$(readlink -f "temp-result/${{ matrix.config }}")"

  check-and-push:
    runs-on: native
    needs:
      - update-and-build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Update flake inputs
        run: nix flake update
      - name: give autofollow a chance to mess with flake.lock
        run: nix run .#write-flake
      - name: Set git username for commits
        run: git config user.name "Automatic Flake Updater"
      - name: Set git email for commits
        run: git config user.email "flake-updater@binarin.info"
      - name: Commit updates
        run: git commit --allow-empty -am "Bump inputs"
      - name: Run flake check
        run: nix flake check
      - name: Push to flake-bump branch
        run: git push --force origin master:flake-bump
      - uses: ./.forgejo/actions/forgejo-api-auth
        with:
          token: ${{ secrets.PR_TOKEN }}
          key-name: nixos-config-bumper
      - name: Maybe create PR
        run: fj -H forgejo.lynx-lizard.ts.net pr create -r binarin/nixos-config --base master --head flake-bump --body "Bump flake inputs" "Bump everything" || true
