on:
  schedule:
    - cron: "13 10 * * Mon"
  workflow_dispatch: {}

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update-flake:
    runs-on: native
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Update flake inputs
        run: nix flake update
      - name: Run autofollow
        run: nix run .#write-flake
      - name: Format code
        run: nix fmt
      - name: Set git username for commits
        run: git config user.name "Automatic Flake Updater"
      - name: Set git email for commits
        run: git config user.email "flake-updater@binarin.info"
      - name: Commit updates
        run: git commit -am "Bump inputs" || echo "No changes to commit"
      - name: Push to flake-bump branch
        run: git push --force origin HEAD:flake-bump

  update-caddy-hash:
    runs-on: native
    needs: update-flake
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake-bump
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Build caddy-with-cloudflare-dns and update hash if needed
        run: |
          # Try building caddy-with-cloudflare-dns with --rebuild to force hash verification
          BUILD_OUTPUT=$(nix build .#caddy-with-cloudflare-dns --no-link --rebuild 2>&1) || true

          if echo "$BUILD_OUTPUT" | grep -q "hash mismatch in fixed-output derivation"; then
            echo "Hash mismatch detected, extracting new hash..."
            NEW_HASH=$(echo "$BUILD_OUTPUT" | grep "got:" | sed 's/.*got: *//' | tr -d ' ')

            if [ -n "$NEW_HASH" ]; then
              echo "New hash: $NEW_HASH"

              # Update the hash in the source file
              CADDY_FILE="modules/packages/caddy-with-cloudflare-dns.nix"
              sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$NEW_HASH\"|" "$CADDY_FILE"

              # Verify the change
              grep "hash = " "$CADDY_FILE"

              # Commit the change
              git config user.name "Automatic Flake Updater"
              git config user.email "flake-updater@binarin.info"
              git add "$CADDY_FILE"
              git commit -m "Update caddy-with-cloudflare-dns hash" || echo "No changes to commit"
              git push --force origin HEAD:flake-bump
            fi
          else
            echo "Caddy build succeeded or failed for other reasons"
            echo "$BUILD_OUTPUT"
          fi

  update-trezor-nixpkgs:
    runs-on: native
    needs: update-caddy-hash
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake-bump
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Update nixpkgs-trezor-agent to match main nixpkgs
        run: nix run .#update-trezor-agent
      - name: Commit and push if build succeeded
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "Automatic Flake Updater"
          git config user.email "flake-updater@binarin.info"
          git add -A
          git commit -m "Bump nixpkgs-trezor-agent to match nixpkgs"
          git push --force origin HEAD:flake-bump

  define-matrix:
    runs-on: native
    needs: update-trezor-nixpkgs
    if: always()
    outputs:
      configurations: ${{ steps.define.outputs.configurations }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake-bump
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - id: define
        run: |
          echo "configurations=$(nix run .#env-aware-nix-run -- .#ncf -- ci matrix)" >> "$FORGEJO_OUTPUT"

  build-configs:
    name: build ${{ matrix.config }}
    runs-on: native
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.define-matrix.outputs.configurations) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake-bump
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - uses: ./.forgejo/actions/build-nix
        with:
          config: ${{ matrix.config }}
          output-link: temp-result/${{ matrix.config }}

  create-pr:
    runs-on: native
    needs: build-configs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake-bump
      - uses: ./.forgejo/actions/forgejo-api-auth
        with:
          token: ${{ secrets.PR_TOKEN }}
          key-name: nixos-config-bumper
      - name: Maybe create PR
        run: fj -H forgejo.lynx-lizard.ts.net pr create -r binarin/nixos-config --base master --head flake-bump --body "Bump flake inputs" "Bump everything" || true
