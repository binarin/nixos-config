name: Bump trezor-agent nixpkgs

on:
  push:
    branches:
      - master
    paths:
      - flake.lock

concurrency:
  group: trezor-agent-bump
  cancel-in-progress: true

jobs:
  check-nixpkgs-changed:
    runs-on: native
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          # Check if nixpkgs rev changed between HEAD and HEAD~1
          OLD_REV=$(git show HEAD~1:flake.lock | jq -r '.nodes.nixpkgs.locked.rev')
          NEW_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          if [ "$OLD_REV" != "$NEW_REV" ]; then
            echo "changed=true" >> "$FORGEJO_OUTPUT"
          else
            echo "changed=false" >> "$FORGEJO_OUTPUT"
          fi

  bump-trezor-agent:
    runs-on: native
    needs: check-nixpkgs-changed
    if: needs.check-nixpkgs-changed.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: Update trezor-agent nixpkgs
        run: nix flake update nixpkgs-trezor-agent
      - name: Try building trezor-agent
        id: build
        continue-on-error: true
        run: nix build .#homeModules-test-trezor-agent --no-link
      - name: Commit and push
        if: steps.build.outcome == 'success'
        run: |
          git config user.name "Trezor Agent Bumper"
          git config user.email "trezor-bumper@binarin.info"
          git commit -am "Bump nixpkgs-trezor-agent"
          git push --force origin HEAD:trezor-agent-bump
      - uses: ./.forgejo/actions/forgejo-api-auth
        if: steps.build.outcome == 'success'
        with:
          token: ${{ secrets.PR_TOKEN }}
          key-name: trezor-agent-bumper
      - name: Create PR
        if: steps.build.outcome == 'success'
        run: |
          fj -H forgejo.lynx-lizard.ts.net pr create \
            -r binarin/nixos-config \
            --base master \
            --head trezor-agent-bump \
            --body "Automatic trezor-agent nixpkgs bump" \
            "Bump nixpkgs-trezor-agent" || true
