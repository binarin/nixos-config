on:
  push:
    branches:
      - master

jobs:
  define-matrix:
    runs-on: native
    outputs:
      configurations: ${{ steps.define.outputs.configurations }}
    steps:
      - uses: actions/checkout@v4
      - id: define
        run: |
          echo "configurations=$(nix run .#env-aware-nix-run -- .#ncf -- ci matrix)" >> "$FORGEJO_OUTPUT"

  nix-build:
    name: build ${{ matrix.config }}
    runs-on: native
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.define-matrix.outputs.configurations) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.forgejo/actions/git-crypt-unlock
        with:
          git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
      - name: get artifact name
        id: artifact
        run: |
          echo "name=$(nix run .#env-aware-nix-run -- .#ncf -- ci expand-matrix-entry '${{ matrix.config }}')" >> "$FORGEJO_OUTPUT"
      - uses: ./.forgejo/actions/build-nix
        with:
          config: ${{ matrix.config }}
          paths-file: ${{ runner.temp }}/${{ steps.artifact.outputs.name }}.paths
      - uses: ./.forgejo/actions/sign-and-push-cache
        with:
          paths-file: ${{ runner.temp }}/${{ steps.artifact.outputs.name }}.paths
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          signing-key-pem: ${{ secrets.GARAGE_STORE_PRIV_KEY_PEM }}
      - uses: actions/upload-artifact@v3
        with:
          name: cached-paths-${{ steps.artifact.outputs.name }}
          path: ${{ runner.temp }}/${{ steps.artifact.outputs.name }}.paths
          retention-days: 7

  collect-cached-paths:
    name: collect all cached paths
    runs-on: native
    needs: nix-build
    if: always()
    steps:
      - uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: dedupe and combine paths
        run: |
          mkdir -p combined
          find artifacts -name '*.paths' -exec cat {} \; | sort -u > combined/all-cached-paths.txt
          echo "Total unique paths: $(wc -l < combined/all-cached-paths.txt)"
      - uses: actions/upload-artifact@v3
        with:
          name: all-cached-paths
          path: combined/all-cached-paths.txt
          retention-days: 30
