# auto-generated via: ncf ci generate
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
jobs:
  nixos-configuration:
    runs-on: native
    strategy:
      fail-fast: false
      matrix:
        nixosConfiguration:
        - claude-nixos-config
        - demandred
        - devcontainer
        - docker-on-nixos
        - forgejo
        - furfur
        - garage
        - ishamael
        - iso
        - mail
        - media
        - monitor
        - nix-cache
        - qdevice
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: fake git-crypt unlock
      run: nix run .#ncf -- ci fake-unlock
    - run: nix run .#ncf -- build nixos ${{ matrix.nixosConfiguration }} --no-nom
  check:
    runs-on: native
    needs:
    - nixos-configuration
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: fake git-crypt unlock
      run: nix run .#ncf -- ci fake-unlock
    - run: nix flake check
