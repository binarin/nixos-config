on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  flake-check:
    name: nix flake check
    runs-on: native
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.forgejo/actions/fake-unlock
      - run: nix flake check

  define-matrix:
    runs-on: native
    outputs:
      configurations: ${{ steps.define.outputs.configurations }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.forgejo/actions/fake-unlock
      - id: define
        run: |
          echo "configurations=$(nix run .#env-aware-nix-run -- .#ncf -- ci matrix)" >> "$FORGEJO_OUTPUT"
          cat "$FORGEJO_OUTPUT"

  nix-build:
    name: build ${{ matrix.config }}
    runs-on: native
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.define-matrix.outputs.configurations) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.forgejo/actions/fake-unlock
      - uses: ./.forgejo/actions/build-nix
        with:
          config: ${{ matrix.config }}
