on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  define-matrix:
    runs-on: native
    outputs:
      configurations: ${{ steps.define.outputs.configurations }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: fake git-crypt unlock
        run: nix run .#ncf -- ci fake-unlock
      - id: define
        run: |
          echo "configurations=$(nix run .#ncf -- ci matrix)" >> "$FORGEJO_OUTPUT"
          cat "$FORGEJO_OUTPUT"

  nixos-configuration:
    runs-on: native
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.define-matrix.outputs.configurations) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: parse config
        id: parse
        run: |
          echo 'buildPath<<EOF' >> "$FORGEJO_OUTPUT"
          echo '${{ matrix.config }}' | jq -r '.buildPath' >> "$FORGEJO_OUTPUT"
          echo 'EOF' >> "$FORGEJO_OUTPUT"
      - name: fake git-crypt unlock
        run: nix run .#ncf -- ci fake-unlock
      - run: nix build '${{ steps.parse.outputs.buildPath }}' --no-link --print-out-paths

  check:
    runs-on: native
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: fake git-crypt unlock
        run: nix run .#ncf -- ci fake-unlock
      - run: nix flake check
