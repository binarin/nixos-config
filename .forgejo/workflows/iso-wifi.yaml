on:
  workflow_dispatch: {}
jobs:
  build-iso-wifi:
    runs-on: native
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
    - uses: ./.forgejo/actions/git-crypt-unlock
      with:
        git-crypt-key: ${{ secrets.GIT_CRYPT_KEY }}
    - name: Build WiFi-enabled ISO
      run: nix run .#env-aware-nix-run -- .#ncf -- iso build-wifi --output "$RUNNER_TEMP/nixos-wifi.iso" --password-file files/agares-guest.git-crypt
    - name: Upload ISO artifact
      uses: https://code.forgejo.org/forgejo/upload-artifact@v4
      with:
        name: nixos-wifi-iso
        path: ${{ runner.temp }}/nixos-wifi.iso
        retention-days: 30
