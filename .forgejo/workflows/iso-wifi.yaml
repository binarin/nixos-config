on:
  workflow_dispatch: {}
jobs:
  build-iso-wifi:
    runs-on: native
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
    - name: unlock git-crypt
      env:
        GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
      run: git crypt unlock <(echo "$GIT_CRYPT_KEY"|base64 -d)
    - name: Build WiFi-enabled ISO
      run: nix run --ignore-env .#ncf -- iso build-wifi --password-file files/agares-guest.git-crypt
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: nixos-wifi-iso
        path: ~/.cache/nixos-config/master/iso-wifi/nixos-wifi.iso
        retention-days: 30
